<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dashboard{% endblock %} — Sistema IoT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
    .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .stat-card .display-6 { font-weight: 700; }
    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
    .badge-si { background-color: #198754; }
    .badge-no { background-color: #6c757d; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/dashboard"><i class="bi bi-router me-2"></i>Sistema IoT</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if active == 'reportes' %}active{% endif %}" href="/dashboard/reportes">
              <i class="bi bi-bar-chart me-1"></i>Reportes
            </a>
          </li>
          {% if is_admin %}
          <li class="nav-item">
            <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/dashboard">
              <i class="bi bi-grid me-1"></i>Accesos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'usuarios' %}active{% endif %}" href="/dashboard/usuarios">
              <i class="bi bi-people me-1"></i>Usuarios
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active == 'aulas' %}active{% endif %}" href="/dashboard/aulas">
              <i class="bi bi-door-open me-1"></i>Aulas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/logout">
              <i class="bi bi-box-arrow-right me-1"></i>Salir
            </a>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link" href="/login">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
